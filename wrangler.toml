# Cloudflare Pages configuration for slateremote.com.
# Deployed via `@cloudflare/next-on-pages`.
#
# Recommended deploy flow: connect this repo in Cloudflare Pages dashboard
# (https://dash.cloudflare.com/?to=/:account/pages) and let the git integration
# build on every push to main. The build command is `npx @cloudflare/next-on-pages`
# and the build output directory is `.vercel/output/static`.
#
# For CLI deploy from a local machine: `npm run pages:deploy`.

name = "slateremote"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"
