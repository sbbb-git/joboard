name: scrape-and-deploy

# Daily at 04:00 UTC: runs the 8 scrapers, commits data/jobs.json back to
# main, then rebuilds the static site and deploys it to Cloudflare Pages.
# Also runs on every push to main to redeploy whenever code changes.

on:
  schedule:
    - cron: '0 4 * * *'
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Scrape (skip on push-only runs)
        if: github.event_name != 'push'
        run: npm run scrape:local

      - name: Commit refreshed jobs
        if: github.event_name != 'push'
        run: |
          set -euo pipefail
          if git diff --quiet data/jobs.json; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/jobs.json
          git commit -m "chore(jobs): refresh $(date -u +%F)"
          git push origin main

      - name: Build static site
        env:
          SITE_URL: https://slateremote.com
        run: npm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler@latest pages deploy out --project-name=slateremote --branch=main --commit-dirty=true
