name: scrape

# Daily cron at 04:00 UTC. Runs the scrapers in-process, writes data/jobs.json,
# commits and pushes back to the repo. The commit triggers Cloudflare Pages to
# rebuild and redeploy automatically.

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run scrape:local
      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/jobs.json; then
            echo "No changes to commit"
            exit 0
          fi
          git add data/jobs.json
          today=$(date -u +%F)
          git commit -m "chore(jobs): refresh ${today}"
          git push origin main
