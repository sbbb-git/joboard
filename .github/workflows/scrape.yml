name: scrape

# Daily cron at 04:00 UTC. Hits the deployed /api/cron/scrape endpoint with
# the Bearer secret. The endpoint runs the 8 scrapers, dedupes, filters, and
# commits the result to data/jobs.json via the GitHub API, which triggers
# Cloudflare Pages to rebuild and redeploy.
#
# Required repo secrets:
#   SITE_URL       e.g. https://slateremote.com
#   CRON_SECRET    same value as the deployed env var

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit cron endpoint
        run: |
          set -euo pipefail
          response=$(curl -sS -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.SITE_URL }}/api/cron/scrape")
          body=$(echo "$response" | head -n -1)
          code=$(echo "$response" | tail -n 1)
          echo "HTTP $code"
          echo "$body" | head -c 4000
          test "$code" = "200"
