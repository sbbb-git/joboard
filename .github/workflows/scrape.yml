name: scrape-and-deploy

# Daily at 04:00 UTC: scrape -> commit -> build -> deploy -> IndexNow ping.
# Also runs on every push to main to redeploy whenever code changes.

on:
  schedule:
    - cron: '0 4 * * *'
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Scrape (skip on push-only runs)
        if: github.event_name != 'push'
        run: npm run scrape:local

      - name: Commit refreshed jobs
        if: github.event_name != 'push'
        run: |
          set -euo pipefail
          if git diff --quiet data/jobs.json; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/jobs.json
          git commit -m "chore(jobs): refresh $(date -u +%F)"
          git push origin main

      - name: Generate client-side search index
        run: node scripts/gen_search_index.mjs

      - name: Generate llms.txt + llms-full.txt
        run: node scripts/gen_llms.mjs

      - name: Build static site
        env:
          SITE_URL: https://slateremote.com
          NEXT_PUBLIC_CF_ANALYTICS_TOKEN: ${{ secrets.CF_ANALYTICS_TOKEN }}
          NEXT_PUBLIC_STRIPE_FEATURED_30D: ${{ secrets.STRIPE_FEATURED_30D }}
          NEXT_PUBLIC_STRIPE_SPONSORED_TOP: ${{ secrets.STRIPE_SPONSORED_TOP }}
          NEXT_PUBLIC_BEEHIIV_EMBED: ${{ secrets.BEEHIIV_EMBED }}
        run: npm run build

      - name: Patch <html lang> per locale
        run: node scripts/fix_html_lang.mjs

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler@latest pages deploy out --project-name=slateremote --branch=main --commit-dirty=true

      - name: Ping IndexNow
        if: success()
        continue-on-error: true
        env:
          SITE_URL: https://slateremote.com
          INDEXNOW_KEY: 1cb9f8a61b957eb23ab2e38131576cd2
        run: |
          set -uo pipefail
          if [ ! -f out/sitemap.xml ]; then
            echo "No sitemap.xml found, skipping IndexNow ping"
            exit 0
          fi
          urls=$(grep -oP '(?<=<loc>)[^<]+' out/sitemap.xml 2>/dev/null | head -10000 || true)
          if [ -z "$urls" ]; then
            echo "No URLs in sitemap, skipping"
            exit 0
          fi
          count=$(echo "$urls" | wc -l)
          echo "Submitting $count URLs to IndexNow"
          echo "$urls" | split -l 1000 - /tmp/indexnow-batch-
          for f in /tmp/indexnow-batch-*; do
            urlList=$(jq -R -s -c 'split("\n") | map(select(length > 0))' < "$f")
            payload=$(jq -n --arg host "slateremote.com" --arg key "$INDEXNOW_KEY" --arg keyLocation "$SITE_URL/$INDEXNOW_KEY.txt" --argjson urlList "$urlList" \
              '{host: $host, key: $key, keyLocation: $keyLocation, urlList: $urlList}')
            code=$(curl -s -o /tmp/indexnow.out -w "%{http_code}" -X POST 'https://api.indexnow.org/indexnow' \
              -H 'content-type: application/json' \
              -d "$payload" || echo "000")
            echo "  batch $(basename $f): HTTP $code"
          done
